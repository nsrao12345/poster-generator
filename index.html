<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Pateshwar Yuva Seva Samiti Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-dark: #7a1010;
            --gold: #d4af37;
            --text-dark: #333333;
            --header-red: #a50b0b;
            --cream-bg: #fdfbf7;
            --gold-border: #b8860b;
        }

        body {
            font-family: 'Noto Serif Devanagari', serif;
            background: #2a2a2a; 
            margin: 0;
            padding: 10px;
            color: var(--text-dark);
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }

        @media (min-width: 1000px) {
            .container { flex-direction: row; align-items: flex-start; justify-content: center; }
        }

        .controls {
            width: 100%;
            max-width: 360px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border-top: 5px solid var(--primary-dark);
            box-sizing: border-box;
            z-index: 10;
        }

        .controls h2 { margin-top: 0; font-size: 20px; color: var(--primary-dark); margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #555; }
        .controls input, .controls textarea, .controls select {
            width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
        }

        .btn {
            width: 100%; color: #ffffff; border: none; cursor: pointer; font-size: 16px;
            font-weight: 600; padding: 14px; border-radius: 6px; transition: 0.2s;
            background: linear-gradient(135deg, var(--primary-dark), #a31818);
        }
        .btn:disabled { opacity: 0.7; }

        /* --- POSTER DESIGN (9:16 RATIO) --- */
        .poster-wrapper {
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .poster {
            width: 800px; 
            height: 1422px; /* 9:16 Aspect Ratio */
            background-color: var(--cream-bg);
            position: relative;
            box-sizing: border-box;
            border: 12px solid var(--gold-border);
            outline: 4px solid var(--header-red);
            outline-offset: -16px;
            overflow: hidden;
            transform-origin: top left;
        }

        .scallop-h {
            position: absolute; width: 100%; height: 15px;
            background: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSczMCcgaGVpZ2h0PScxNSc+PHBhdGggZD0nTTAsMCBBMTUsMTUgMCAwLDAgMzAsMCBaJyBmaWxsPScjYjg4NjBiJy8+PC9zdmc+") repeat-x;
            z-index: 10; pointer-events: none;
        }
        .scallop-v {
            position: absolute; width: 15px; height: 100%;
            background: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxNScgaGVpZ2h0PSczMCc+PHBhdGggZD0nTTAsMCBBMTUsMTUgMCAwLDAgMCwzMCBaJyBmaWxsPScjYjg4NjBiJy8+PC9zdmc+") repeat-y;
            z-index: 10; pointer-events: none;
        }
        .scallop-top { top: 0; } .scallop-bottom { bottom: 0; transform: scaleY(-1); }
        .scallop-left { left: 0; } .scallop-right { right: 0; transform: scaleX(-1); }

        .poster-header {
            background-color: var(--header-red);
            height: 220px;
            display: flex; justify-content: center; align-items: center;
            border-bottom: 5px solid var(--gold-border);
            position: relative; z-index: 5;
        }

        .scallop-trim {
            position: absolute; top: 220px; width: 100%; height: 20px;
            background: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSczMCcgaGVpZ2h0PScyMCc+PHBhdGggZD0nTTAsMCBRMTUsMjAgMzAsMCBMMzAsMjAgTDAsMjAgWicgZmlsbD0nI2I4ODYwYicvPjwvc3ZnPg==") repeat-x;
            z-index: 4;
        }

        .header-img {
            position: absolute; width: 90px; height: 90px; border-radius: 50%;
            border: 4px solid var(--gold); object-fit: cover; background: #fff;
        }
        .img-lt { top: 15px; left: 20px; } .img-lb { top: 115px; left: 20px; }
        .img-rt { top: 15px; right: 20px; } .img-rb { top: 115px; right: 20px; }

        .header-text { text-align: center; padding-top: 15px; }
        .header-text .ganesh { font-size: 22px; color: #ffda75; font-weight: 700; margin-bottom: 2px; }
        .header-text .samiti { font-size: 42px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); margin: 0; line-height: 1.1; }

        .content-area {
            position: absolute; top: 270px; width: 100%; text-align: center; padding: 0 60px; box-sizing: border-box;
        }

        .date-box { font-size: 20px; font-weight: 700; color: var(--primary-dark); margin-bottom: 20px; }

        .amount-box {
            font-size: 34px; font-weight: 900; color: var(--primary-dark);
            background: rgba(212, 175, 55, 0.15); border: 2px dashed var(--gold);
            padding: 15px 40px; border-radius: 12px; display: inline-block; margin-bottom: 25px;
        }

        .message { font-size: 26px; line-height: 1.8; font-weight: 600; color: #222; margin-bottom: 30px; }

        /* BIGGER PHOTO AREA */
        .photo-container { display: flex; justify-content: center; margin-top: 10px; }
        .photo-frame {
            width: 400px; height: 500px; 
            border: 8px solid var(--gold-border); border-radius: 15px;
            background: #fff; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .bottom-gifts { position: absolute; bottom: 20px; right: 25px; width: 300px; z-index: 5; }
        .footer-tag { position: absolute; bottom: 25px; width:100%; text-align: center; font-size: 14px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>पोस्टर बनाएं</h2>
        <div class="input-group">
            <label>अवसर चुनें (Event Type)</label>
            <select id="templateType" onchange="changeTemplate(this.value)">
                <option value="self">स्वयं का जन्मदिन (Own Birthday)</option>
                <option value="son">पुत्र का जन्मदिन (Son's Birthday)</option>
                <option value="daughter">पुत्री का जन्मदिन (Daughter's Birthday)</option>
                <option value="anniversary">वैवाहिक वर्षगांठ (Anniversary)</option>
                <option value="custom">अन्य (Custom)</option>
            </select>
        </div>
        <div class="input-group">
            <label id="labelName1">मुख्य नाम (Primary Name)</label>
            <input id="name1" placeholder="Name" oninput="updateMessage()">
        </div>
        <div class="input-group" id="name2Group" style="display: none;">
            <label id="labelName2">दूसरा नाम (Secondary Name)</label>
            <input id="name2" placeholder="Name" oninput="updateMessage()">
        </div>
        <div class="input-group">
            <label>समर्पण राशि (Amount - ₹)</label>
            <input type="number" id="inputAmount" value="501" oninput="updateAmountDisplay(this.value)">
        </div>
        <div class="input-group">
            <label>दिनांक (Date)</label>
            <input type="date" id="inputDate" onchange="updateDate(this.value)">
        </div>
        <div class="input-group" id="messageGroup" style="display: none;">
            <label>संदेश (Message)</label>
            <textarea id="messageInput" rows="5" oninput="document.getElementById('messageDisplay').innerText=this.value"></textarea>
        </div>
        <div class="input-group">
            <label>फोटो अपलोड करें (Upload Photo)</label>
            <input type="file" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>
        <button class="btn" id="downloadBtn" onclick="downloadPoster()">↓ स्टेटस डाउनलोड करें</button>
    </div>

    <div class="poster-wrapper">
        <div class="poster" id="poster">
            <div class="scallop-h scallop-top"></div>
            <div class="scallop-h scallop-bottom"></div>
            <div class="scallop-v scallop-left"></div>
            <div class="scallop-v scallop-right"></div>
            
            <div class="poster-header">
                <img src="header1.png" class="header-img img-lt">
                <img src="header3.png" class="header-img img-lb">
                <div class="header-text">
                    <div class="ganesh">॥ श्री गणेशाय नमः ॥</div>
                    <div class="samiti">पाटेश्वर युवा सेवा समिति</div>
                    <div class="samiti" style="font-size:32px; color:#ffda75">ठि. पटली</div>
                </div>
                <img src="header2.png" class="header-img img-rt">
                <img src="header4.png" class="header-img img-rb">
            </div>
            <div class="scallop-trim"></div>

            <div class="content-area">
                <div class="date-box">दिनांक: <span id="displayDate"></span></div>
                <div class="amount-box">समर्पण राशि: ₹ <span id="displayAmount">501</span></div>
                <div class="message" id="messageDisplay"></div>
                
                <div class="photo-container">
                    <div class="photo-frame">
                        <img id="displayPhoto" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    </div>
                </div>
            </div>

            <img src="footer-gifts.png" class="bottom-gifts">
            <div class="footer-tag">© 2026, Design by NsRao</div>
        </div>
    </div>
</div>

<script>
    let currentTemplate = "self";

    function scalePosterForMobile() {
        const wrapper = document.querySelector('.poster-wrapper');
        const poster = document.getElementById('poster');
        const wrapperWidth = wrapper.clientWidth;
        if (wrapperWidth < 800 && wrapperWidth > 0) {
            const scaleFactor = wrapperWidth / 800;
            poster.style.transform = `scale(${scaleFactor})`;
            wrapper.style.height = `${1422 * scaleFactor}px`; 
        } else {
            poster.style.transform = 'none';
            wrapper.style.height = 'auto';
        }
    }
    window.addEventListener('resize', scalePosterForMobile);

    window.onload = () => {
        scalePosterForMobile();
        const today = new Date();
        const formattedDate = today.toISOString().split('T')[0];
        document.getElementById("inputDate").value = formattedDate;
        updateDate(formattedDate);
        changeTemplate('self');
    };

    function updateDate(dateStr) {
        if(!dateStr) return;
        const parts = dateStr.split('-');
        document.getElementById("displayDate").innerText = `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    function updateAmountDisplay(val) {
        document.getElementById('displayAmount').innerText = val;
        updateMessage();
    }

    function changeTemplate(t) {
        currentTemplate = t;
        const name2Group = document.getElementById("name2Group");
        const labelName1 = document.getElementById("labelName1");
        const labelName2 = document.getElementById("labelName2");
        const messageGroup = document.getElementById("messageGroup");
        if (messageGroup) messageGroup.style.display = (t === "custom") ? "block" : "none";

        if (t === "self") {
            name2Group.style.display = "none";
            labelName1.innerText = "व्यक्ति का नाम (Name)";
        } else if (t === "son" || t === "daughter") {
            name2Group.style.display = "block";
            labelName1.innerText = "पिता/माता का नाम (Parent's Name)";
            labelName2.innerText = (t === "son" ? "पुत्र" : "पुत्री") + " का नाम (Child's Name)";
        } else if (t === "anniversary") {
            name2Group.style.display = "block";
            labelName1.innerText = "पति का नाम (Husband's Name)";
            labelName2.innerText = "पत्नी का नाम (Wife's Name)";
        } else {
            name2Group.style.display = "none";
            labelName1.innerText = "नाम (Name)";
        }
        updateMessage();
    }

    function updateMessage() {
        const n1 = document.getElementById("name1").value || "[नाम 1]";
        const n2 = document.getElementById("name2").value || "[नाम 2]";
        const amt = document.getElementById("displayAmount").innerText;
        let text = "";

        if (currentTemplate === "self") {
            text = `श्री ${n1} ने अपने जन्मदिन के शुभ अवसर पर पाटेश्वर युवा सेवा समिति, ठि. पटली को ${amt} रुपये का आर्थिक सहयोग प्रदान किया। इस अवसर पर श्री ${n1} को जन्मदिन की हार्दिक बधाई एवं शुभकामनाएं।`;
        } else if (currentTemplate === "son") {
            text = `श्री ${n1} ने अपने सुपुत्र ${n2} के जन्मदिन के शुभ अवसर पर पाटेश्वर युवा सेवा समिति, ठि. पटली को ${amt} रुपये का आर्थिक सहयोग प्रदान किया। इस अवसर पर ${n2} को जन्मदिन की हार्दिक बधाई एवं शुभकामनाएं।`;
        } else if (currentTemplate === "daughter") {
            text = `श्री ${n1} ने अपनी सुपुत्री ${n2} के जन्मदिन के शुभ अवसर पर पाटेश्वर युवा सेवा समिति, ठि. पटली को ${amt} रुपये का आर्थिक सहयोग प्रदान किया। इस अवसर पर ${n2} को जन्मदिन की हार्दिक बधाई एवं शुभकामनाएं।`;
        } else if (currentTemplate === "anniversary") {
            text = `श्री ${n1} एवं श्रीमती ${n2} ने अपनी वैवाहिक वर्षगांठ के शुभ अवसर पर पाटेश्वर युवा सेवा समिति, ठि. पटली को ${amt} रुपये का आर्थिक सहयोग प्रदान किया। इस अवसर पर दोनों को वैवाहिक वर्षगांठ की हार्दिक बधाई एवं शुभकामनाएं।`;
        } else if (currentTemplate === "custom") {
            text = document.getElementById("messageInput").value;
        }
        document.getElementById("messageDisplay").innerText = text;
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById("displayPhoto").src = e.target.result;
            reader.readAsDataURL(file);
        }
    }

    function downloadPoster() {
        const btn = document.getElementById("downloadBtn");
        const originalText = btn.innerText;
        btn.innerText = "⏳ Generating...";
        btn.disabled = true;

        const posterElement = document.getElementById("poster");
        const wrapperElement = document.querySelector('.poster-wrapper');
        const originalTransform = posterElement.style.transform;
        const originalHeight = wrapperElement.style.height;

        posterElement.style.transform = 'none';
        wrapperElement.style.height = 'auto';

        html2canvas(posterElement, { scale: 2, useCORS: true, backgroundColor: "#fdfbf7" }).then(canvas => {
            posterElement.style.transform = originalTransform;
            wrapperElement.style.height = originalHeight;

            canvas.toBlob(blob => {
                const file = new File([blob], "Pateshwar_Status.png", { type: "image/png" });
                const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

                if (isIOS && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ files: [file], title: 'Poster' })
                    .then(() => resetBtn(btn, originalText))
                    .catch(() => resetBtn(btn, originalText));
                } else {
                    const link = document.createElement("a");
                    link.href = window.URL.createObjectURL(blob);
                    link.download = "Pateshwar_Status.png";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => window.URL.revokeObjectURL(link.href), 100);
                    resetBtn(btn, originalText);
                }
            }, 'image/png');
        }).catch(err => {
            posterElement.style.transform = originalTransform;
            wrapperElement.style.height = originalHeight;
            alert("Error: " + err.message);
            resetBtn(btn, originalText);
        });
    }

    function resetBtn(btn, text) {
        btn.innerText = text;
        btn.disabled = false;
    }
</script>
</body>
</html>
